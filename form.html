{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&display=swap" rel="stylesheet">
    <title>GradeGuru | Analyser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="icon" href="{% static 'logo.png' %}" type="image/png"> 
    <style>
        body {
            font-family: "Afacad Flux", sans-serif;
            margin: 0;
            padding: 0;
            color: #ffffff;
            background-color: hsl(218, 41%, 15%);
            background-image: radial-gradient(650px circle at 0% 0%, hsl(218, 41%, 35%) 15%, hsl(218, 41%, 30%) 35%, hsl(218, 41%, 20%) 75%, hsl(218, 41%, 19%) 80%, transparent 100%),
                              radial-gradient(1250px circle at 100% 100%, hsl(218, 41%, 45%) 15%, hsl(218, 41%, 30%) 35%, hsl(218, 41%, 20%) 75%, hsl(218, 41%, 19%) 80%, transparent 100%);
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .navbar-center .headline {
            font-size: 1.8em;
            font-weight: bold;
            color: #03dac5;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        .nav-links li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-links li a:hover, .history-active {
            color: #03dac5 !important;
        }

        .cta {
            text-align: center;
            padding: 40px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        input.form-control {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid #03dac5;
        }

        input.form-control:focus {
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: 0 0 10px rgba(3, 218, 197, 0.3);
        }

        .btn-history {
            background-color: transparent;
            border: 2px solid #03dac5;
            color: #03dac5;
            font-weight: bold;
            margin-left: 10px;
            transition: 0.3s;
        }

        .btn-history:hover {
            background-color: #03dac5;
            color: #000;
        }
    </style>
</head>

<body class="background-radial-gradient">
    <header>
        <nav class="navbar">
            <div class="navbar-left">
                <img src="{% static 'logo.png' %}" alt="Logo" style="width: 60px;">
            </div>
            <div class="navbar-center">
                <div class="headline">GradeGuru: Analyser</div>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/history">History</a></li>
                <li><a href="/form">Analyser</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container mt-5" style="max-width: 800px;">
        <section class="cta">
            <h2 style="color: #03dac5;">Ready to Grade?</h2>
            <p>Upload the PDFs below and let AI handle the comparison.</p>
        </section>
        
        <div class="card p-4" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(3, 218, 197, 0.2); border-radius: 15px;">
            <form action="/analysis/" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Student's Answer Sheet (PDF)</label>
                    <input type="file" class="form-control" name="file" accept=".pdf" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Model Answer Sheet (PDF)</label>
                    <input type="file" class="form-control" name="model_answers" accept=".pdf" required>
                </div>
                
                <div class="d-flex align-items-center">
                    <button type="submit" class="btn btn-primary btn-lg" style="background: #03dac5; border: none; color: black; font-weight: bold;">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Run Analysis
                    </button>
                    
                    <a href="/history" class="btn btn-lg btn-history">
                        <i class="fa-solid fa-clock-rotate-left"></i> View History
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <footer class="text-center mt-5">
        <p>&copy; 2026 GradeGuru: Team CodeX | <a href="/history" style="color: #03dac5; text-decoration: none;">View Past Records</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
